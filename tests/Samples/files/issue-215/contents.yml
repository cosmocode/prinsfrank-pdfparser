      Deutscher Bundestag Drucksache 21/1407
      21. Wahlperiode 28.08.2025
      Antwort 
      der Bundesregierung 
      auf die Kleine Anfrage der Abgeordneten Jörg Cezanne, Desiree Becker, Violetta 
      Bock, Clara Bünger, Anne-Mieke Bremer, Katrin Fey, Dr. Gregor Gysi, Luke Hoß, 
      Ferat Koçak, Jan Köstering, Sonja Lemke, Tamara Mazzi, Bodo Ramelow, David 
      Schliesing, Aaron Valent, Donata Vogtschmidt, Christin Willnat, Janine Wissler 
      und der Fraktion Die Linke 
      – Drucksache 21/1240 –
      Neubau des Bundeskriminalamts in Wiesbaden
      Vorbemerkung der Fragesteller
      Das Hessische Ministerium der Finanzen, das Bundeskriminalamt (BKA), die 
      Bundesanstalt für Immobilienaufgaben (BImA) und die Landeshauptstadt 
      Wiesbaden (LHW) planen im Rahmen der städtebaulichen Entwicklungsmaß-
      nahme „Ostfeld“ den Neubau eines zentralen Campus für das BKA. Ziel ist 
      es, die bislang über das Stadtgebiet verstreuten Liegenschaften des BKA an 
      einem Ort zu bündeln („All in one“). Dafür soll auf rund 30 Hektar eines ins-
      gesamt ca. 120 Hektar großen Entwicklungsgebiets Baurecht geschaffen wer-
      den. Der Aufstellungsbeschluss zum Bebauungsplan „Bundeskriminalamt“ in 
      den Ortsbezirken Erbenheim und Südost der Landeshauptstadt Wiesbaden 
      wurde am 2. April 2025 von der Stadtverordnetenversammlung beschlossen 
      (https://piwi.wiesbaden.de/sitzungsvorlage/detail/3434709).
      Das Vorhaben ist Teil eines größeren Plans zur Schaffung eines neuen Stadt-
      teils, stößt jedoch auf erheblichen Widerstand. Konfliktlinien verlaufen ent-
      lang verschiedener Interessen: Landwirte wehren sich gegen den Verlust wert-
      voller Ackerflächen, weil weite Teile des Gebiets als Vorrangflächen für Land-
      wirtschaft und regionale Grünzüge ausgewiesen sind. Die am Rhein liegenden 
      Stadtteile Kastel und Kostheim sowie der anliegende Stadtteil Erbenheim ge-
      hören nach der landesweiten Klimaanalyse Hessen zu den durch Hitzestress 
      besonders belasteten Gebieten (https://landesplanung.hessen.de/sites/landespla
      nung.hessen.de/files/2024-10/landeswklimaanalysehessen_abschlussbericht_2
      0240918.pdf, S. 67 f.).
      Zudem hat der Bund für Umwelt und Naturschutz (BUND) Hessen gegen die 
      mit dem Vorhaben verbundene Abweichung vom Regionalplan geklagt. Zwar 
      wurde die Klage zunächst abgewiesen, das Urteil ist aber noch nicht rechts-
      kräftig. In den weiteren Planungsverfahren sollen Maßnahmen zum Klima- 
      und Landschaftsschutz sowie zur Sicherung landwirtschaftlicher Existenzen 
      entwickelt werden. Die Umsetzung des BKA-Neubaus bleibt somit rechtlich, 
      ökologisch und gesellschaftlich umstritten. Daher wird die Bundesregierung 
      zum Planungsstand bei den in ihre direkte Zuständigkeit fallenden Behörden, 
      Die Antwort wurde namens der Bundesregierung mit Schreiben des Bundesministeriums des Innern
      vom 28. August 2025 übermittelt.
      Die Drucksache enthält zusätzlich – in kleinerer Schrifttype – den Fragetext.
