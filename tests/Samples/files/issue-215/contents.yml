    content: |-
      Drucksache 21/1407 – 2 – Deutscher Bundestag – 21. Wahlperiode
      BKA und BImA, sowie zur Gesamtverantwortlichkeit und Koordination des 
      geplanten BKA-Neubaus in Wiesbaden befragt.
      Vorbemerkung der Bundesregierung
      Das Bauprojekt ALL IN ONE befindet sich, nach Billigung der Bedarfsplanung 
      durch das Bundesministerium der Finanzen (BMF) im Juli 2024, gemäß der 
      Richtlinien für die Durchführung von Bauaufgaben des Bundes (RBBau), der-
      zeit in der Phase der Erstellung der Initialen Projektunterlage (IPU).
      Das Bundeskriminalamt (BKA) ist neben der Bundesanstalt für Immobilienauf-
      gaben (BImA) als Bauherrin sowie der Bauverwaltung des Landes Hessen in 
      der Rolle des Nutzers gemäß RBBau daran beteiligt.
      Im Verantwortungsbereich der Landeshauptstadt Wiesbaden wurde am 2. April 
      2025 im Rahmen einer Städtebaulichen Entwicklungsmaßnahme (SEM) der 
      Beschluss für die Änderung des Flächennutzungsplans sowie für die Aufstel-
      lung des Bebauungsplans gefasst.
      Das dazugehörige Verfahren der Bauleitplanung, im Besonderen die Unter-
      suchungen der damit einhergehenden Auswirkungen auf den Naturschutz, be-
      finden sich noch in Prüfung. Diese sind noch nicht so weit gediehen, dass be-
      reits Erkenntnisse dazu vorliegen.
       1. Welche bestehenden Standorte des BKA (z. B. in Wiesbaden, Mecken-
      heim, Berlin und ggf. weitere) sollen durch den Neubau im Bereich Ost-
      feld/Kalkofen ersetzt werden?
      Alle Liegenschaften am Standort Wiesbaden sollen durch den Neubau ersetzt 
      werden.
       2. Welche spezifischen Kriterien und Gewichtungen wurden bei der Stand-
      ortwahl für das BKA im Ostfeld/Kalkofen angewendet, und wie wurden 
      diese im Vergleich zu anderen geprüften Standorten (insbesondere Kon-
      versionsflächen) bewertet, auch unter Berücksichtigung der langfristigen 
      wirtschaftlichen Opportunitätskosten des Verlusts landwirtschaftlicher 
      Flächen und der Kosten für die Bewältigung der Umweltbelastungen?
       5. Sind andere, leichter zu erschließende Flächen in der Region (z. B. ge-
      werbliche und militärische Konversionsflächen) geprüft worden, die 
      weniger Eingriffe in Natur und Umwelt erfordern würden, in Anbetracht 
      der Umwelt- und Klimabelastungen, die in diesem und umliegenden Ge-
      bieten bereits sehr hoch sind, und dementsprechend große und kostspieli-
      ge Anforderungen an die Bewältigung dieser Belastungen stellen wür-
      den?
      Die Fragen 2 und 5 werden aufgrund des Sachzusammenhangs gemeinsam be-
      antwortet.
      Die BImA prüft im Rahmen ihres Erkundungsverfahren alle möglichen zur 
      Verfügung stehenden Bestands- sowie Konversionsflächen. Der Nutzer hat der 
      BImA einen auf das Stadtgebiet beschränkten Erkundungsauftrag erteilt. Aus 
      dieser Erkundung ist auf Grund der benötigten Fläche bzw. spezifischen Flä-
      chenanforderung des Nutzers das Ostfeld als geeigneter Standort hervorgegan-
      gen.
